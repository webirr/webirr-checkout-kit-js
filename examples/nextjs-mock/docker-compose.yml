services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm ci && npm --workspace examples/nextjs-mock run build && npm --workspace examples/nextjs-mock run start -- --hostname 0.0.0.0"
    ports:
      - "${WEBIRR_CHECKOUT_EXAMPLE_PORT:-3100}:3000"
    environment:
      WEBIRR_CHECKOUT_MODE: ${WEBIRR_CHECKOUT_MODE:-testenv}
      WEBIRR_TEST_ENV_MERCHANT_ID: ${WEBIRR_TEST_ENV_MERCHANT_ID:-}
      WEBIRR_TEST_ENV_API_KEY: ${WEBIRR_TEST_ENV_API_KEY:-}
      WEBIRR_PROD_MERCHANT_ID: ${WEBIRR_PROD_MERCHANT_ID:-}
      WEBIRR_PROD_API_KEY: ${WEBIRR_PROD_API_KEY:-}
      WEBIRR_GATEWAY_BASE_URL: ${WEBIRR_GATEWAY_BASE_URL:-}
      NEXT_PUBLIC_WEBIRR_EXAMPLE_REFERENCE: ${NEXT_PUBLIC_WEBIRR_EXAMPLE_REFERENCE:-}
    volumes:
      - ../../:/workspace:cached
      - webirr_checkout_node_modules:/workspace/node_modules
      - webirr_checkout_next:/workspace/examples/nextjs-mock/.next

volumes:
  webirr_checkout_node_modules:
  webirr_checkout_next:
