services:
  web:
    build:
      context: ../..
      dockerfile: examples/checkout-nextjs-app/Dockerfile
    ports:
      - "3100:3000"
    environment:
      WEBIRR_MERCHANT_ID: ${WEBIRR_MERCHANT_ID:-}
      WEBIRR_API_KEY: ${WEBIRR_API_KEY:-}
      WEBIRR_TEST_MODE: ${WEBIRR_TEST_MODE:-true}
    volumes:
      - webirr_checkout_data:/app/data
    restart: unless-stopped

volumes:
  webirr_checkout_data:
